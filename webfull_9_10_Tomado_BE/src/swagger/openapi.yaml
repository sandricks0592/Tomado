  /api/v1/retro-logs/{id}:
    patch:
      operationId: updateRetroLog
      tags: [RetroLogs]
      summary: 회고 수정
      description: |
        회고 본문(`content`) 수정. 템플릿별 필수 키는 모두 포함하고, 값은 문자열이면 빈 문자열("")도 허용한다.
        `is_dirty`, `draft_content`는 선택 필드(데일리 로그와 동일한 이름)이며, 클라이언트에서 쓰지 않으면 생략해도 된다.
        요청 본문에는 위 세 필드 중 **최소 하나**가 있어야 한다(전부 생략·빈 객체는 불가).
      security:
        - BearerAuth: []
        - AccessTokenCookie: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateRetroLogRequest'
            examples:
              tech:
                summary: Tech 템플릿
                value:
                  content:
                    learned_today: OpenAPI oneOf로 타입별 content 스키마를 문서화하는 법을 익혔다.
                    applied_technology: 공통 sendServiceError 패턴으로 컨트롤러 에러 응답을 맞췄다.
                    technical_difficulty: 예시 키와 실제 검증 키가 어긋나지 않게 유지하는 게 번거로웠다.
                    next_to_try: 회고 템플릿 변경에 대한 마이그레이션 가이드를 팀 위키에 적는다.
                  is_dirty: false
                  draft_content: null
              decision:
                summary: Decision 템플릿
                value:
                  content:
                    decision_made: 템플릿 필수 키 검증은 서비스 레이어에만 둔다.
                    decision_reason: 저장소·트랜잭션과 분리해 테스트하기 쉽게 하기 위해서다.
                    outcome_impact: 컨트롤러는 얇게 유지되고 검증 로직이 한곳에 모인다.
                    alternatives_considered: Zod 스키마 분리, DB CHECK 등은 이번 범위에서는 보류했다.
                  is_dirty: false
                  draft_content: null
              communication:
                summary: Communication 템플릿
                value:
                  content:
                    communication_highlights: 프론트에 새 content 키 목록을 한 번에 공유했다.
                    communication_friction: 배포 전에 예시 JSON만 보고 구현해 필드명이 어긋났다.
                    feedback_received: 스웨거 examples를 타입별로 나눠 달라는 요청이 있었다.
                    improvements: 릴리즈 노트에 breaking change를 명시하기로 했다.
                  is_dirty: false
                  draft_content: null
              emotion:
                summary: Emotion 템플릿
                value:
                  content:
                    mood_today: 문서·코드 동시 수정은 집중이 필요해 다소 긴장됐다.
                    what_energized: 빌드가 한 번에 통과했을 때.
                    what_drained: YAML 들여쓰기 실수를 두 번 고쳤다.
                    grateful_for: CI에서 타입체크가 잡아줘서 런타임 전에 알 수 있었다.
                  is_dirty: false
                  draft_content: null
      responses:
        '200':
          description: 수정 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RetroLog'
        '400':
          description: 유효성 오류(content 키 누락·타입, 수정 필드 없음, is_dirty/draft_content 타입 등)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error:
                  code: VALIDATION_ERROR
                  message: 수정할 필드가 없습니다.
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

    delete:
      operationId: deleteRetroLog
      tags: [RetroLogs]
      summary: 회고 삭제
      description: 회고 삭제. `daily_focus_stats.has_retro_log = false` UPSERT.
      security:
        - BearerAuth: []
