          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: 삭제 성공 (본문 없음)
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

