openapi: 3.0.3
info:
  title: Tomado API
  description: |
    포모도로 타이머 + 투두리스트 + 데일리로그 + 회고록을 통합한 생산성 기록 서비스

    ## 인증
    보호된 엔드포인트는 `Authorization: Bearer {access_token}` 헤더 또는 `access_token` 쿠키가 필요합니다.
    Access Token 만료 시 `/auth/refresh`로 재발급하세요.

    ## 삭제 정책
    완료된 투두(`completed_at IS NOT NULL`)는 삭제 불가 — 기록 보존 원칙.
  version: 1.0.0
  contact:
    name: Tomado Team

servers:
  - url: https://webfull-9-10-tomado-be.onrender.com
    description: Production (Render)
  - url: http://localhost:4000
    description: Production

tags:
  - name: Auth
    description: 인증 (회원가입 / 로그인 / 토큰 재발급 / 로그아웃, 토큰은 바디와 HttpOnly 쿠키로 함께 전달)
  - name: Users
    description: 사용자 프로필 및 앱 설정
  - name: Todos
    description: 투두리스트 관리
  - name: Pomodoro
    description: 포모도로 세션 기록
  - name: DailyLogs
    description: 데일리 로그 (마크다운 일일 기록)
  - name: RetroLogs
    description: 회고 로그 (4종 템플릿)
  - name: Stats
    description: 집중 통계 (히트맵 / 달력 / 차트)

# ─────────────────────────────────────────
# Security
# ─────────────────────────────────────────

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    AccessTokenCookie:
      type: apiKey
      in: cookie
      name: access_token
    RefreshTokenCookie:
      type: apiKey
      in: cookie
      name: refresh_token

  # ── 공통 응답 ──────────────────────────
  responses:
    Unauthorized:
      description: 유효하지 않거나 만료된 Access Token
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            error:
              code: UNAUTHORIZED
              message: 유효하지 않거나 만료된 Access Token입니다.

    Forbidden:
      description: 다른 사용자의 리소스 접근 시도
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            error:
              code: FORBIDDEN
              message: 본인의 리소스만 접근할 수 있습니다.

    NotFound:
      description: 리소스를 찾을 수 없음
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            error:
              code: NOT_FOUND
              message: 해당 리소스를 찾을 수 없습니다.

  # ── 공통 스키마 ────────────────────────
  schemas:
    Error:
      type: object
      properties:
        error:
          type: object
          properties:
            code:
              type: string
              example: VALIDATION_ERROR
            message:
              type: string
              example: 요청 파라미터가 올바르지 않습니다.
            field:
              type: string
              description: 유효성 검사 오류 시만 포함
              example: login_id

    LoginRequest:
      type: object
      required: [login_id, password]
      properties:
        login_id:
          type: string
          example: devjohn
        password:
          type: string
          example: P@ssw0rd!

    RegisterRequest:
      type: object
      required: [login_id, password, nickname]
      properties:
        login_id:
          type: string
          minLength: 4
          maxLength: 20
          example: devjohn
          description: 로그인 ID (영문+숫자, 4~20자)
        password:
          type: string
          minLength: 8
          example: P@ssw0rd!
          description: 비밀번호 (8자 이상, 영문+숫자+특수문자)
        nickname:
          type: string
          minLength: 2
          maxLength: 20
          example: 존개발
          description: 서비스 내 닉네임 (2~20자)

    LoginIdCheckResponse:
      type: object
      required: [login_id, available]
      properties:
        login_id:
          type: string
          example: devjohn
        available:
          type: boolean
          example: true

    RefreshTokenRequest:
      type: object
      description: 쿠키 기반 재발급을 기본으로 하며, 필요 시 refresh_token을 body로도 전달 가능
      properties:
        refresh_token:
          type: string
          example: eyJhbGci...

    UpdateProfileRequest:
      type: object
      properties:
        nickname:
          type: string
          minLength: 2
          maxLength: 20
          example: 존시니어
        avatar_url:
          type: string
          example: https://cdn.tomado.io/avatars/new.png

    UpdateSettingsRequest:
      type: object
      properties:
        focus_min:
          type: integer
          minimum: 1
          maximum: 120
          example: 50
        short_break_min:
          type: integer
          minimum: 1
          maximum: 30
          example: 10
        long_break_min:
          type: integer
          minimum: 1
          maximum: 60
          example: 15
        sessions_per_set:
          type: integer
          minimum: 1
          maximum: 10
          example: 4
        auto_carry_todo:
          type: boolean
          example: false

    CreateTodoRequest:
      type: object
      required: [title, assigned_date]
      properties:
        title:
          type: string
          maxLength: 200
          example: API 명세서 작성
        description:
          type: string
          example: 인증/투두/포모도로 엔드포인트 정의
        assigned_date:
          type: string
          format: date
          example: '2026-06-10'

    UpdateTodoRequest:
      type: object
      properties:
        title:
          type: string
          example: API 명세서 작성 (수정)
        description:
          type: string
          example: 회고 엔드포인트 추가 정의
        assigned_date:
          type: string
          format: date
          example: '2026-06-10'

    ToggleTodoRequest:
      type: object
      required: [completed]
      properties:
        completed:
          type: boolean
          example: true
          description: true = 완료 처리, false = 미완료 취소

    ReorderTodoRequest:
      type: object
      properties:
        prev_order:
          type: number
          format: float
          example: 1.0
          description: 앞 항목의 sort_order (맨 앞이면 생략)
        next_order:
          type: number
          format: float
          example: 2.0
          description: 뒤 항목의 sort_order (맨 뒤면 생략)

    CreatePomodoroSessionRequest:
      type: object
      required: [type]
      properties:
        type:
          type: string
          enum: [focus, short_break, long_break]
          example: focus

    EndPomodoroSessionRequest:
      type: object
      required: [status, actual_sec, ended_at]
      properties:
        status:
          type: string
          enum: [completed, cancelled, skipped]
          example: completed
        actual_sec:
          type: integer
          example: 1500
          description: 실제 경과 시간 (초)
        ended_at:
          type: string
          format: date-time
          example: '2026-06-10T09:25:00Z'

    CreateDailyLogRequest:
      type: object
      required: [log_date, content]
      properties:
        title:
          type: string
          example: "오늘의 개발 일지"
        log_date:
          type: string
          format: date
          example: '2026-06-10'
        content:
          type: string
          example: "## 오늘 한 일\n- API 명세서 작성 완료"
        tags:
          type: array
          items:
            type: string
          example: [backend, docs]

    UpdateDailyLogRequest:
      type: object
      properties:
        title:
          type: string
          example: "오늘의 개발 일지"
        content:
          type: string
          example: "## 오늘 한 일\n- API 명세서 작성 완료\n- 팀 코드 리뷰"
        tags:
          type: array
          items:
            type: string
          example: [backend, review]
        is_dirty:
          type: boolean
          example: false
          description: 저장 완료 시 false 전송
        draft_content:
          type: string
          nullable: true
          example: null
          description: 자동저장 실패 시 복구용 임시본

    DailyLogSearchItem:
      type: object
      properties:
        id:
          type: string
          format: uuid
        log_date:
          type: string
          format: date
        title:
          type: string
        content_preview:
          type: string
          description: 검색어 앞뒤 50자
        tags:
          type: array
          items:
            type: string
        has_retro_log:
          type: boolean

    CreateRetroLogRequest:
      type: object
      required: [retro_date, template_type, content]
      properties:
        daily_log_id:
          type: string
          format: uuid
          nullable: true
          example: f6a7b8c9-d0e1-2345-f012-456789012345
          description: 연관 일일 로그 ID (선택)
        retro_date:
          type: string
          format: date
          example: '2026-06-10'
        template_type:
          type: string
          enum: [Tech, Decision, Communication, Emotion]
          example: Tech
        content:
          type: object
          description: |
            template_type별 필수 키는 모두 포함하고, 값은 문자열이면 빈 문자열("")도 허용한다.
          example:
            learned_today: Prisma $transaction으로 생성과 통계 갱신을 한 번에 처리하는 패턴을 배웠다.
            applied_technology: optional JSON 필드 null 처리에 Prisma.DbNull을 적용했다.
            technical_difficulty: PATCH 시 Json 타입과 DbNull 조합에서 타입 에러가 났다.
            next_to_try: 회고 content 검색에 인덱스/쿼리 전략을 실험해본다.

    UpdateRetroLogRequest:
      type: object
      description: |
        `content`, `is_dirty`, `draft_content` 중 최소 하나는 반드시 포함해야 합니다.
        위 세 키가 모두 빠진 빈 본문 `{}`이면 400 `VALIDATION_ERROR`(수정할 필드가 없습니다)가 반환됩니다.
      minProperties: 1
      properties:
        content:
          type: object
          description: |
            기존 template_type에 맞는 content 구조로 수정. 각 값은 문자열이면 빈 문자열("")도 허용한다.
          example:
            learned_today: OpenAPI oneOf로 타입별 content 스키마를 문서화하는 법을 익혔다.
            applied_technology: 공통 sendServiceError 패턴으로 컨트롤러 에러 응답을 맞췄다.
            technical_difficulty: 예시 키와 실제 검증 키가 어긋나지 않게 유지하는 게 번거로웠다.
            next_to_try: 회고 템플릿 변경에 대한 마이그레이션 가이드를 팀 위키에 적는다.
        is_dirty:
          type: boolean
          example: false
        draft_content:
          type: object
          nullable: true
          example: null

    RetroLogSearchItem:
      type: object
      properties:
        id:
          type: string
          format: uuid
        daily_log_id:
          type: string
          format: uuid
          nullable: true
        retro_date:
          type: string
          format: date
        template_type:
          type: string
          enum: [Tech, Decision, Communication, Emotion]
        content_preview:
          type: string
          description: 검색어 앞뒤 50자

    RetroLogListItem:
      type: object
      properties:
        retro_date:
          type: string
          format: date
          example: '2026-03-14'
        template_types:
          type: array
          items:
            type: string
            enum: [Tech, Decision, Communication, Emotion]
          example: [Tech, Communication]
        count:
          type: integer
          example: 2
        latest_created_at:
          type: string
          format: date-time
          example: '2026-03-14T11:20:00Z'
        retros:
          type: array
          description: 해당 날짜에 작성된 회고 상세 목록(템플릿별 content 포함)
          items:
            $ref: '#/components/schemas/RetroLog'

    RetroLogListResponse:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/RetroLogListItem'
        page:
          type: integer
          minimum: 1
          example: 1
        page_size:
          type: integer
          minimum: 1
          maximum: 100
          example: 10
        total_count:
          type: integer
          description: 전체 회고 날짜 수
          example: 27
        total_pages:
          type: integer
          example: 3
        has_next:
          type: boolean
          example: true

    StatsOverviewResponse:
      type: object
      properties:
        streak:
          type: integer
          example: 12
          description: 연속 스트릭 (일)
        total_sessions:
          type: integer
          example: 342
          description: 총 포모도로 세션 수
        total_focus_sec:
          type: integer
          example: 615600
          description: 총 집중 시간 (초)
        total_daily_logs:
          type: integer
          example: 28
          description: 총 데일리로그 수
        total_retro_logs:
          type: integer
          example: 12
          description: 총 회고 수

    StatsHeatmapSummaryResponse:
      type: object
      properties:
        total_sessions:
          type: integer
          example: 289
          description: 연간 포모도로 수
        total_focus_sec:
          type: integer
          example: 520200
          description: 연간 집중 시간 (초)
        daily_avg_sessions:
          type: number
          example: 3.9
          description: 일평균 포모도로 수

    User:
      type: object
      properties:
        id:
          type: string
          format: uuid
          example: a1b2c3d4-e5f6-7890-abcd-ef1234567890
        login_id:
          type: string
          example: devjohn
        nickname:
          type: string
          example: 존개발
        avatar_url:
          type: string
          nullable: true
          example: https://cdn.tomado.io/avatars/devjohn.png
        created_at:
          type: string
          format: date-time
          example: '2026-01-15T09:00:00Z'
        updated_at:
          type: string
          format: date-time
          example: '2026-06-01T12:00:00Z'

    UserSettings:
      type: object
      properties:
        id:
          type: string
          format: uuid
          example: b2c3d4e5-f6a7-8901-bcde-f12345678901
        user_id:
          type: string
          format: uuid
          example: a1b2c3d4-e5f6-7890-abcd-ef1234567890
        focus_min:
          type: integer
          minimum: 1
          maximum: 120
          example: 25
        short_break_min:
          type: integer
          minimum: 1
          maximum: 30
          example: 5
        long_break_min:
          type: integer
          minimum: 1
          maximum: 60
          example: 15
        sessions_per_set:
          type: integer
          minimum: 1
          maximum: 10
          example: 4
        auto_carry_todo:
          type: boolean
          example: true
        updated_at:
          type: string
          format: date-time
          example: '2026-06-01T12:00:00Z'

    Todo:
      type: object
      properties:
        id:
          type: string
          format: uuid
          example: c3d4e5f6-a7b8-9012-cdef-123456789012
        user_id:
          type: string
          format: uuid
          example: a1b2c3d4-e5f6-7890-abcd-ef1234567890
        title:
          type: string
          example: API 명세서 작성
        description:
          type: string
          nullable: true
          example: 인증/투두/포모도로 엔드포인트 정의
        assigned_date:
          type: string
          format: date
          example: '2026-06-10'
        sort_order:
          type: number
          format: float
          example: 3.0
        completed_at:
          type: string
          format: date-time
          nullable: true
          example: null
        created_at:
          type: string
          format: date-time
          example: '2026-06-10T09:00:00Z'
        updated_at:
          type: string
          format: date-time
          example: '2026-06-10T09:00:00Z'

    PomodoroSession:
      type: object
      properties:
        id:
          type: string
          format: uuid
          example: d4e5f6a7-b8c9-0123-def0-234567890123
        user_id:
          type: string
          format: uuid
          example: a1b2c3d4-e5f6-7890-abcd-ef1234567890
        type:
          type: string
          enum: [focus, short_break, long_break]
          example: focus
        status:
          type: string
          enum: [completed, cancelled]
          nullable: true
          example: completed
        actual_sec:
          type: integer
          nullable: true
          example: 1500
        focus_date:
          type: string
          format: date
          example: '2026-06-10'
        started_at:
          type: string
          format: date-time
          example: '2026-06-10T09:00:00Z'
        ended_at:
          type: string
          format: date-time
          nullable: true
          example: '2026-06-10T09:25:00Z'
        created_at:
          type: string
          format: date-time
          example: '2026-06-10T09:00:00Z'

    DailyLog:
      type: object
      properties:
        id:
          type: string
          format: uuid
          example: f6a7b8c9-d0e1-2345-f012-456789012345
        user_id:
          type: string
          format: uuid
          example: a1b2c3d4-e5f6-7890-abcd-ef1234567890
        log_date:
          type: string
          format: date
          example: '2026-06-10'
        title:
          type: string
          nullable: true
          example: "오늘의 개발 일지"
        content:
          type: string
          example: "## 오늘 한 일\n- API 명세서 작성 완료\n- ERD 리뷰"
        tags:
          type: array
          items:
            type: string
          example: [backend, docs]
        is_dirty:
          type: boolean
          example: false
        draft_content:
          type: string
          nullable: true
          example: null
        created_at:
          type: string
          format: date-time
          example: '2026-06-10T09:00:00Z'
        updated_at:
          type: string
          format: date-time
          example: '2026-06-10T18:00:00Z'

    DailyLogSummary:
      type: object
      properties:
        id:
          type: string
          format: uuid
          example: f6a7b8c9-d0e1-2345-f012-456789012345
        log_date:
          type: string
          format: date
          example: '2026-06-10'
        updated_at:
          type: string
          format: date-time
          example: '2026-06-10T18:00:00Z'
        title:
          type: string
          nullable: true
          example: "오늘의 개발 일지"
        content:
          type: string
          example: "## 오늘 한 일\n- API 명세서 작성 완료\n- ERD 리뷰"
        tags:
          type: array
          items:
            type: string
          example: [backend, docs]
        has_retro_log:
          type: boolean
          example: true

    PaginatedDailyLogsResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/DailyLogSummary'
        meta:
          type: object
          properties:
            total_count:
              type: integer
              example: 100
            total_pages:
              type: integer
              example: 10
            current_page:
              type: integer
              example: 1
            limit:
              type: integer
              example: 10

    RetroLog:
      type: object
      properties:
        id:
          type: string
          format: uuid
          example: b8c9d0e1-f2a3-4567-0123-678901234567
        user_id:
          type: string
          format: uuid
          example: a1b2c3d4-e5f6-7890-abcd-ef1234567890
        daily_log_id:
          type: string
          format: uuid
          example: f6a7b8c9-d0e1-2345-f012-456789012345
        retro_date:
          type: string
          format: date
          example: '2026-06-10'
        template_type:
          type: string
          enum: [Tech, Decision, Communication, Emotion]
          example: Tech
        content:
          description: |
            template_type(Tech|Decision|Communication|Emotion)에 따라 아래 oneOf 중 하나의 객체 형태입니다.
            각 필드 값은 문자열이면 빈 문자열("")도 허용합니다(요청 본문 `content`와 동일한 규칙).
          oneOf:
            - type: object
              description: Tech — learned today, applied tech, difficulty, next try
              required:
                [learned_today, applied_technology, technical_difficulty, next_to_try]
              properties:
                learned_today:
                  type: string
                  description: Technology or concept learned today
                  example: Learned Prisma $transaction for atomic create + stats update.
                applied_technology:
                  type: string
                  description: Technology or approach applied today
                  example: Applied Prisma.DbNull for optional JSON null updates.
                technical_difficulty:
                  type: string
                  description: Technical challenges faced
                  example: Json field null typing errors during PATCH.
                next_to_try:
                  type: string
                  description: What to try next
                  example: Experiment with DB indexing for retro content search.
            - type: object
              description: Decision — decision, reason, outcome, alternatives
              required: [decision_made, decision_reason, outcome_impact, alternatives_considered]
              properties:
                decision_made:
                  type: string
                  description: Decision made today
                  example: Require both date and daily_log_id for retro GET.
                decision_reason:
                  type: string
                  description: Why this decision
                  example: Clearer API contract and fewer ambiguous lookups.
                outcome_impact:
                  type: string
                  description: Results and impact
                  example: FE can rely on stable query shape; fewer support questions.
                alternatives_considered:
                  type: string
                  description: Other options if any (e.g. "None" or listed alternatives)
                  example: 'Considered: date-only, id-only, or both required — chose both.'
            - type: object
              description: Communication — wins, friction, feedback, improvements
              required:
                [
                  communication_highlights,
                  communication_friction,
                  feedback_received,
                  improvements,
                ]
              properties:
                communication_highlights:
                  type: string
                  description: Communication that went well
                  example: Retro API contract was aligned quickly in a short sync.
                communication_friction:
                  type: string
                  description: Misunderstandings or friction
                  example: Initial doc said only one query param was required.
                feedback_received:
                  type: string
                  description: Feedback received from others
                  example: FE asked for explicit 400 errors when params are missing.
                improvements:
                  type: string
                  description: What to improve next time
                  example: Keep Swagger and Notion in sync when changing query rules.
            - type: object
              description: Emotion — mood, energizers, drains, gratitude
              required: [mood_today, what_energized, what_drained, grateful_for]
              properties:
                mood_today:
                  type: string
                  description: Overall mood today
                  example: Tired but relieved after resolving merge conflicts.
                what_energized:
                  type: string
                  description: What gave you energy
                  example: Pair debugging with a teammate.
                what_drained:
                  type: string
                  description: What drained your energy
                  example: Long context switching between auth and retro features.
                grateful_for:
                  type: string
                  description: What you are grateful for
                  example: Clear code review comments that sped up the fix.
          example:
            learned_today: Learned Prisma $transaction for atomic create + stats update.
            applied_technology: Applied Prisma.DbNull for optional JSON null updates.
            technical_difficulty: Json field null typing errors during PATCH.
            next_to_try: Experiment with DB indexing for retro content search.
        is_dirty:
          type: boolean
          example: false
        draft_content:
          type: object
          nullable: true
          example: null
        created_at:
          type: string
          format: date-time
          example: '2026-06-10T19:00:00Z'
        updated_at:
          type: string
          format: date-time
          example: '2026-06-10T19:30:00Z'

    DailyFocusStat:
      type: object
      properties:
        focus_date:
          type: string
          format: date
          example: '2026-06-10'
        total_focus_sec:
          type: integer
          example: 7200
        completed_sessions:
          type: integer
          example: 4
        completed_todos:
          type: integer
          example: 6
        has_daily_log:
          type: boolean
          example: true
        has_retro_log:
          type: boolean
          example: true

    AuthTokens:
      type: object
      properties:
        access_token:
          type: string
          example: eyJhbGci...
        refresh_token:
          type: string
          example: eyJhbGci...

# ─────────────────────────────────────────
# Paths
# ─────────────────────────────────────────
paths:

  # ══════════════════════════════════════
  # 1. AUTH
  # ══════════════════════════════════════
  /api/v1/auth/login-id/check:
    get:
      operationId: checkLoginId
      tags: [Auth]
      summary: 로그인 아이디 중복 확인
      description: 회원가입 전에 `login_id` 사용 가능 여부를 확인합니다.
      parameters:
        - in: query
          name: login_id
          required: true
          schema:
            type: string
            minLength: 4
            maxLength: 20
            pattern: '^[a-zA-Z0-9]{4,20}$'
          description: 확인할 로그인 ID (영문+숫자, 4~20자)
      responses:
        '200':
          description: 확인 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginIdCheckResponse'
              examples:
                available:
                  summary: 사용 가능
                  value:
                    login_id: devjohn
                    available: true
                unavailable:
                  summary: 이미 사용 중
                  value:
                    login_id: devjohn
                    available: false
        '400':
          description: 유효성 검사 실패
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error:
                  code: VALIDATION_ERROR
                  message: login_id는 4~20자 영문+숫자여야 합니다.
                  field: login_id

  /api/v1/auth/register:
    post:
      operationId: register
      tags: [Auth]
      summary: 회원가입
      description: 신규 회원 가입. 성공 시 `users` + `user_settings` 레코드 자동 생성.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '201':
          description: 회원가입 성공
          headers:
            Set-Cookie:
              description: HttpOnly 쿠키 `access_token`, `refresh_token`이 함께 설정됩니다.
              schema:
                type: string
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/AuthTokens'
                  - type: object
                    properties:
                      user:
                        $ref: '#/components/schemas/User'
              example:
                access_token: eyJhbGci...
                refresh_token: eyJhbGci...
                user:
                  id: a1b2c3d4-e5f6-7890-abcd-ef1234567890
                  login_id: devjohn
                  nickname: 존개발
                  avatar_url: null
                  created_at: '2026-01-15T09:00:00Z'
        '400':
          description: 유효성 검사 실패
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error:
                  code: VALIDATION_ERROR
                  message: login_id는 4~20자 영문+숫자여야 합니다.
                  field: login_id
        '409':
          description: 이미 사용 중인 login_id
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error:
                  code: CONFLICT
                  message: 이미 사용 중인 login_id입니다.

  /api/v1/auth/login:
    post:
      operationId: login
      tags: [Auth]
      summary: 로그인
      description: Supabase Auth 검증 후 Access / Refresh Token 발급.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: 로그인 성공
          headers:
            Set-Cookie:
              description: HttpOnly 쿠키 `access_token`, `refresh_token`이 함께 설정됩니다.
              schema:
                type: string
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/AuthTokens'
                  - type: object
                    properties:
                      user:
                        $ref: '#/components/schemas/User'
              example:
                access_token: eyJhbGci...
                refresh_token: eyJhbGci...
                user:
                  id: a1b2c3d4-e5f6-7890-abcd-ef1234567890
                  login_id: devjohn
                  nickname: 존개발
                  avatar_url: null
                  created_at: '2026-01-15T09:00:00Z'
        '401':
          description: 아이디 또는 비밀번호 불일치
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error:
                  code: UNAUTHORIZED
                  message: 아이디 또는 비밀번호가 올바르지 않습니다.

  /api/v1/auth/refresh:
    post:
      operationId: refreshToken
      tags: [Auth]
      summary: 토큰 재발급
      description: |
        Refresh Token으로 Access Token 재발급 (Rotation). 기존 Refresh Token은 즉시 폐기됨.
        기본 동작은 쿠키(`refresh_token`) 기반이며, body의 `refresh_token`은 선택값이다.
      security:
        - RefreshTokenCookie: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshTokenRequest'
      responses:
        '200':
          description: 새 토큰 발급 성공
          headers:
            Set-Cookie:
              description: HttpOnly 쿠키 `access_token`, `refresh_token`이 함께 설정됩니다.
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthTokens'
              example:
                access_token: eyJhbGci...새로운토큰
                refresh_token: eyJhbGci...새로운토큰
        '401':
          description: Refresh Token 만료 또는 무효
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error:
                  code: UNAUTHORIZED
                  message: Refresh Token이 만료되었거나 유효하지 않습니다.

  /api/v1/auth/logout:
    post:
      operationId: logout
      tags: [Auth]
      summary: 로그아웃
      description: Supabase에서 현재 세션의 Refresh Token을 폐기.
      security:
        - BearerAuth: []
        - AccessTokenCookie: []
      responses:
        '204':
          description: 로그아웃 성공 (본문 없음)
        '401':
          $ref: '#/components/responses/Unauthorized'

  # ══════════════════════════════════════
  # 2. USERS
  # ══════════════════════════════════════
  /api/v1/users/me:
    get:
      operationId: getMyProfile
      tags: [Users]
      summary: 내 프로필 조회
      description: 현재 로그인한 사용자의 프로필 정보 조회.
      security:
        - BearerAuth: []
        - AccessTokenCookie: []
      responses:
        '200':
          description: 프로필 조회 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '401':
          $ref: '#/components/responses/Unauthorized'

    patch:
      operationId: updateMyProfile
      tags: [Users]
      summary: 프로필 수정
      description: 닉네임 수정. 변경할 필드만 전송 가능.
      security:
        - BearerAuth: []
        - AccessTokenCookie: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateProfileRequest'
            example:
              nickname: 존시니어
      responses:
        '200':
          description: 수정 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '400':
          description: 유효성 검사 실패
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error:
                  code: VALIDATION_ERROR
                  message: 닉네임은 2~20자 이내여야 합니다.
                  field: nickname
        '401':
          $ref: '#/components/responses/Unauthorized'

    delete:
      operationId: deleteMe
      tags: [Users]
      summary: 회원 탈퇴
      description: |
        현재 로그인한 사용자의 계정을 삭제합니다.
        Supabase Auth 계정과 앱 DB의 사용자 데이터가 함께 삭제됩니다.
      security:
        - BearerAuth: []
        - AccessTokenCookie: []
      responses:
        '204':
          description: 회원 탈퇴 성공 (본문 없음)
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          description: 회원 탈퇴 처리 중 서버 오류
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error:
                  code: INTERNAL_ERROR
                  message: 서버 오류가 발생했습니다.

  /api/v1/users/me/avatar:
    post:
      operationId: uploadMyAvatar
      tags: [Users]
      summary: 프로필 이미지 업로드/교체
      description: |
        현재 로그인한 사용자의 프로필 이미지를 업로드하거나 교체합니다.
        이미 등록된 이미지가 있으면 삭제 후 새 파일 1개만 유지합니다.
      security:
        - BearerAuth: []
        - AccessTokenCookie: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [avatar]
              properties:
                avatar:
                  type: string
                  format: binary
                  description: 업로드할 프로필 이미지 파일
      responses:
        '200':
          description: 업로드 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '400':
          description: 파일 누락 또는 유효성 검사 실패
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                missingFile:
                  summary: 파일 없음
                  value:
                    error:
                      code: VALIDATION_ERROR
                      message: avatar 파일이 필요합니다.
                invalidFile:
                  summary: 이미지 아님
                  value:
                    error:
                      code: VALIDATION_ERROR
                      message: 이미지 파일만 업로드할 수 있습니다.
        '401':
          $ref: '#/components/responses/Unauthorized'

    delete:
      operationId: deleteMyAvatar
      tags: [Users]
      summary: 프로필 이미지 삭제
      description: 현재 로그인한 사용자의 프로필 이미지를 삭제하고 기본 아바타 상태로 되돌립니다.
      security:
        - BearerAuth: []
        - AccessTokenCookie: []
      responses:
        '200':
          description: 삭제 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/v1/users/me/settings:
    get:
      operationId: getMySettings
      tags: [Users]
      summary: 앱 설정 조회
      description: 사용자 앱 설정 (포모도로 시간, 자동이월 등) 조회.
      security:
        - BearerAuth: []
        - AccessTokenCookie: []
      responses:
        '200':
          description: 설정 조회 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserSettings'
        '401':
          $ref: '#/components/responses/Unauthorized'

    patch:
      operationId: updateMySettings
      tags: [Users]
      summary: 앱 설정 수정
      description: 앱 설정 변경. 변경할 필드만 전송 가능.
      security:
        - BearerAuth: []
        - AccessTokenCookie: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateSettingsRequest'
            example:
              focus_min: 50
              short_break_min: 10
              auto_carry_todo: false
      responses:
        '200':
          description: 설정 수정 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserSettings'
        '400':
          description: 유효성 검사 실패 (범위 초과 등)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error:
                  code: VALIDATION_ERROR
                  message: focus_min은 1~120 범위여야 합니다.
                  field: focus_min
        '401':
          $ref: '#/components/responses/Unauthorized'

  # ══════════════════════════════════════
  # 3. TODOS
  # ══════════════════════════════════════
  /api/v1/todos:
    get:
      operationId: getTodos
      tags: [Todos]
      summary: 날짜별 투두 목록 조회
      description: |
        특정 날짜의 투두 목록 조회. `sort_order` 기준 오름차순 정렬.
        과거 날짜 조회 시 완료 투두(`completed_at IS NOT NULL`)가 자연스럽게 포함됨.
      security:
        - BearerAuth: []
        - AccessTokenCookie: []
      parameters:
        - name: date
          in: query
          required: true
          schema:
            type: string
            format: date
          example: '2026-06-10'
          description: 조회 날짜 (YYYY-MM-DD)
      responses:
        '200':
          description: 투두 목록 조회 성공
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Todo'
        '401':
          $ref: '#/components/responses/Unauthorized'

    post:
      operationId: createTodo
      tags: [Todos]
      summary: 투두 생성
      description: 새 투두 생성. `sort_order`는 기존 마지막 값 + 1.0으로 자동 계산.
      security:
        - BearerAuth: []
        - AccessTokenCookie: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTodoRequest'
      responses:
        '201':
          description: 투두 생성 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Todo'
        '400':
          description: 필수 필드 누락 또는 날짜 형식 오류
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error:
                  code: VALIDATION_ERROR
                  message: assigned_date는 필수 항목입니다.
                  field: assigned_date
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/v1/todos/{id}:
    patch:
      operationId: updateTodo
      tags: [Todos]
      summary: 투두 수정
      description: 투두 내용 수정. 변경할 필드만 전송.
      security:
        - BearerAuth: []
        - AccessTokenCookie: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
          example: c3d4e5f6-a7b8-9012-cdef-123456789012
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateTodoRequest'
      responses:
        '200':
          description: 수정 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Todo'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

    delete:
      operationId: deleteTodo
      tags: [Todos]
      summary: 투두 삭제
      description: |
        **미완료 투두(`completed_at IS NULL`)만 삭제 가능.**
        완료된 투두는 "그날 한 일"의 기록이므로 삭제 불가 — `400` 반환.
      security:
        - BearerAuth: []
        - AccessTokenCookie: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: 삭제 성공 (본문 없음)
        '400':
          description: 완료된 투두는 삭제 불가
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error:
                  code: VALIDATION_ERROR
                  message: 완료된 투두는 삭제할 수 없습니다. 완료 기록은 보존됩니다.
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/v1/todos/{id}/complete:
    patch:
      operationId: toggleTodoComplete
      tags: [Todos]
      summary: 투두 완료 토글
      description: |
        완료/미완료 토글.
        - `completed: true` → `completed_at = 현재시각`, `daily_focus_stats.completed_todos +1`
        - `completed: false` → `completed_at = null`, `daily_focus_stats.completed_todos -1`
      security:
        - BearerAuth: []
        - AccessTokenCookie: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ToggleTodoRequest'
      responses:
        '200':
          description: 토글 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Todo'
              examples:
                completed:
                  summary: 완료 처리 시
                  value:
                    id: c3d4e5f6-a7b8-9012-cdef-123456789012
                    title: API 명세서 작성
                    assigned_date: '2026-06-10'
                    sort_order: 3.0
                    completed_at: '2026-06-10T14:30:00Z'
                    updated_at: '2026-06-10T14:30:00Z'
                uncompleted:
                  summary: 완료 취소 시
                  value:
                    id: c3d4e5f6-a7b8-9012-cdef-123456789012
                    title: API 명세서 작성
                    assigned_date: '2026-06-10'
                    sort_order: 3.0
                    completed_at: null
                    updated_at: '2026-06-10T14:35:00Z'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/v1/todos/{id}/reorder:
    patch:
      operationId: reorderTodo
      tags: [Todos]
      summary: 투두 순서 변경
      description: |
        드래그앤드롭 후 `sort_order` 업데이트.
        A(1.0)~B(2.0) 사이 삽입 시 midpoint(1.5) 사용. 범위 부족 시 전체 재정렬 실행.
      security:
        - BearerAuth: []
        - AccessTokenCookie: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReorderTodoRequest'
            example:
              prev_order: 1.0
              next_order: 2.0
      responses:
        '200':
          description: 순서 변경 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Todo'
              example:
                id: c3d4e5f6-a7b8-9012-cdef-123456789012
                title: API 명세서 작성
                sort_order: 1.5
                updated_at: '2026-06-10T11:00:00Z'
        '400':
          description: prev_order >= next_order 충돌
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error:
                  code: VALIDATION_ERROR
                  message: prev_order는 next_order보다 작아야 합니다.

  # ══════════════════════════════════════
  # 4. POMODORO
  # ══════════════════════════════════════
  /api/v1/pomodoro/sessions:
    post:
      operationId: startPomodoroSession
      tags: [Pomodoro]
      summary: 세션 시작
      description: 포모도로 세션 시작 기록 생성.
      security:
        - BearerAuth: []
        - AccessTokenCookie: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreatePomodoroSessionRequest'
      responses:
        '201':
          description: 세션 생성 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PomodoroSession'
              example:
                id: d4e5f6a7-b8c9-0123-def0-234567890123
                user_id: a1b2c3d4-e5f6-7890-abcd-ef1234567890
                type: focus
                status: null
                actual_sec: null
                focus_date: '2026-06-10'
                started_at: '2026-06-10T09:00:00Z'
                ended_at: null
                created_at: '2026-06-10T09:00:00Z'
        '400':
          description: type 값 오류 또는 날짜 형식 오류
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error:
                  code: VALIDATION_ERROR
                  message: type은 focus, short_break, long_break 중 하나여야 합니다.
                  field: type
        '401':
          $ref: '#/components/responses/Unauthorized'

    get:
      operationId: getPomodoroSessions
      tags: [Pomodoro]
      summary: 세션 이력 조회
      description: 기간별 포모도로 세션 이력 조회.
      security:
        - BearerAuth: []
        - AccessTokenCookie: []
      parameters:
        - name: start_date
          in: query
          required: true
          schema:
            type: string
            format: date
          example: '2026-06-01'
        - name: end_date
          in: query
          required: true
          schema:
            type: string
            format: date
          example: '2026-06-30'
        - name: type
          in: query
          required: false
          schema:
            type: string
            enum: [focus, short_break, long_break]
          description: 세션 종류 필터
      responses:
        '200':
          description: 세션 목록 조회 성공
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/PomodoroSession'
        '400':
          description: 날짜 형식 오류 또는 start_date > end_date
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/v1/pomodoro/sessions/{id}/end:
    patch:
      operationId: endPomodoroSession
      tags: [Pomodoro]
      summary: 세션 종료
      description: |
        세션 종료. `actual_sec` 저장 후 `daily_focus_stats` UPSERT.
        `focus` 타입만 `total_focus_sec`, `completed_sessions` 집계.
      security:
        - BearerAuth: []
        - AccessTokenCookie: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EndPomodoroSessionRequest'
            example:
              status: completed
              actual_sec: 1500
              ended_at: '2026-06-10T09:25:00Z'
      responses:
        '200':
          description: 세션 종료 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PomodoroSession'
        '400':
          description: status 값 오류
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error:
                  code: VALIDATION_ERROR
                  message: status는 completed 또는 cancelled여야 합니다.
                  field: status
        '404':
          $ref: '#/components/responses/NotFound'

  # ══════════════════════════════════════
  # 5. DAILY LOGS
  # ══════════════════════════════════════
  /api/v1/daily-logs:
    get:
      operationId: getDailyLog
      tags: [DailyLogs]
      summary: 날짜별 데일리 로그 조회
      description: 특정 날짜의 데일리 로그 조회. 해당 날짜 로그가 없으면 404 반환.
      security:
        - BearerAuth: []
        - AccessTokenCookie: []
      parameters:
        - name: date
          in: query
          required: true
          schema:
            type: string
            format: date
          example: '2026-06-10'
      responses:
        '200':
          description: 로그 조회 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DailyLog'
        '404':
          description: 해당 날짜 로그 없음
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error:
                  code: NOT_FOUND
                  message: 2026-06-10 날짜의 데일리 로그가 존재하지 않습니다.
        '401':
          $ref: '#/components/responses/Unauthorized'

    post:
      operationId: createDailyLog
      tags: [DailyLogs]
      summary: 데일리 로그 생성
      description: 데일리 로그 생성. 성공 시 `daily_focus_stats.has_daily_log = true` UPSERT.
      security:
        - BearerAuth: []
        - AccessTokenCookie: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateDailyLogRequest'
      responses:
        '201':
          description: 로그 생성 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DailyLog'
        '409':
          description: 해당 날짜 로그 이미 존재
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error:
                  code: CONFLICT
                  message: 2026-06-10 날짜의 데일리 로그가 이미 존재합니다.
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/v1/daily-logs/list:
    get:
      operationId: getDailyLogsList
      tags: [DailyLogs]
      summary: 기간별 로그 목록 조회
      description: 기간 내 데일리 로그 목록 조회 (달력 배지, 이력 페이지용). `content` 필드 제외하여 경량화.
      security:
        - BearerAuth: []
        - AccessTokenCookie: []
      parameters:
        - name: start_date
          in: query
          required: true
          schema:
            type: string
            format: date
          example: '2026-06-01'
        - name: end_date
          in: query
          required: true
          schema:
            type: string
            format: date
          example: '2026-06-30'
      responses:
        '200':
          description: 로그 요약 목록 반환
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/DailyLogSummary'
              example:
                - id: f6a7b8c9-d0e1-2345-f012-456789012345
                  log_date: '2026-06-10'
                  title: '오늘의 개발 일지'
                  tags: [backend, docs]
                  has_retro_log: true
                - id: a7b8c9d0-e1f2-3456-0123-567890123456
                  log_date: '2026-06-11'
                  title: '내일을 위한 준비'
                  tags: [frontend]
                  has_retro_log: false
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/v1/daily-logs/all:
    get:
      operationId: getAllDailyLogs
      tags: [DailyLogs]
      summary: 모든 로그 목록 조회 (페이징)
      description: 사용자의 모든 데일리 로그를 최신순으로 페이징 처리하여 조회.
      security:
        - BearerAuth: []
        - AccessTokenCookie: []
      parameters:
        - name: page
          in: query
          required: false
          schema:
            type: integer
            default: 1
          description: 페이지 번호
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 10
          description: 페이지당 개수 (0을 입력하면 페이징 없이 전체 목록을 조회합니다)
      responses:
        '200':
          description: 페이징된 로그 목록 반환
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedDailyLogsResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/v1/daily-logs/search:
    get:
      operationId: searchDailyLogs
      tags: [DailyLogs]
      summary: 데일리 로그 검색
      description: title + content 기반 검색
      security:
        - BearerAuth: []
        - AccessTokenCookie: []
      parameters:
        - name: q
          in: query
          required: true
          schema:
            type: string
          example: 'API 명세서'
      responses:
        '200':
          description: 검색 결과 반환
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/DailyLogSummary'
        '400':
          description: 검색어 누락
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error:
                  code: VALIDATION_ERROR
                  message: 검색어(q)는 필수입니다.
                  field: q
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/v1/daily-logs/{id}:
    patch:
      operationId: updateDailyLog
      tags: [DailyLogs]
      summary: 데일리 로그 수정
      description: |
        데일리 로그 수정. debounce autoSave 시 `is_dirty=false`, 실패 시 `draft_content`에 임시본 저장.
      security:
        - BearerAuth: []
        - AccessTokenCookie: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateDailyLogRequest'
            examples:
              autoSaveSuccess:
                summary: autoSave 성공 시
                value:
                  content: "## 오늘 한 일\n- API 명세서 작성 완료\n- 팀 코드 리뷰"
                  tags: [backend, review]
                  is_dirty: false
              autoSaveFail:
                summary: autoSave 실패 시 (draft 저장)
                value:
                  is_dirty: true
                  draft_content: "## 오늘 한 일\n- 임시 저장본..."
      responses:
        '200':
          description: 수정 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DailyLog'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

    delete:
      operationId: deleteDailyLog
      tags: [DailyLogs]
      summary: 데일리 로그 삭제
      description: 데일리 로그 삭제. `daily_focus_stats.has_daily_log = false` UPSERT.
      security:
        - BearerAuth: []
        - AccessTokenCookie: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: 삭제 성공 (본문 없음)
        '403':
          description: 권한 없음
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error:
                  code: FORBIDDEN
                  message: 본인의 데일리 로그만 삭제할 수 있습니다.
        '404':
          $ref: '#/components/responses/NotFound'

  # ══════════════════════════════════════
  # 6. RETRO LOGS
  # ══════════════════════════════════════
  /api/v1/retro-logs:
    get:
      operationId: getRetroLog
      tags: [RetroLogs]
      summary: 회고 조회
      description: |
        `date`(YYYY-MM-DD) 기준으로 해당 날짜에 작성한 회고를 모두 조회한다.
        `daily_log_id`는 선택 파라미터이며, 전달 시 사용자 소유·날짜 일치 검증에만 사용한다.
        응답은 `template_type`별 회고를 포함한 배열이다.
      security:
        - BearerAuth: []
        - AccessTokenCookie: []
      parameters:
        - name: date
          in: query
          required: true
          schema:
            type: string
            format: date
          example: '2026-06-10'
          description: 회고 날짜 (YYYY-MM-DD).
        - name: daily_log_id
          in: query
          required: false
          schema:
            type: string
            format: uuid
          example: f6a7b8c9-d0e1-2345-f012-456789012345
          description: 연관 일일 로그 ID (선택). 전달 시 date와 일치해야 한다.
      responses:
        '200':
          description: 회고 조회 성공
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/RetroLog'
              example:
                - id: b8c9d0e1-f2a3-4567-0123-678901234567
                  user_id: a1b2c3d4-e5f6-7890-abcd-ef1234567890
                  daily_log_id: f6a7b8c9-d0e1-2345-f012-456789012345
                  retro_date: '2026-03-14'
                  template_type: Tech
                  content:
                    learned_today: Prisma transaction을 이용한 원자적 저장 패턴을 익혔다.
                    applied_technology: 회고 생성과 통계 업데이트를 한 트랜잭션으로 묶었다.
                    technical_difficulty: JSON 필드 null 처리 타입 이슈가 있었다.
                    next_to_try: content 검색 성능 개선을 위해 인덱스 전략을 검토한다.
                  is_dirty: false
                  draft_content: null
                  created_at: '2026-03-14T10:00:00Z'
                  updated_at: '2026-03-14T10:30:00Z'
                - id: c9d0e1f2-a3b4-5678-0123-789012345678
                  user_id: a1b2c3d4-e5f6-7890-abcd-ef1234567890
                  daily_log_id: f6a7b8c9-d0e1-2345-f012-456789012345
                  retro_date: '2026-03-14'
                  template_type: Communication
                  content:
                    communication_highlights: 짧은 싱크로 API 계약을 빠르게 맞췄다.
                    communication_friction: 초기 요구사항 전달이 일부 누락됐다.
                    feedback_received: 오류 응답 메시지를 더 구체화해 달라는 피드백을 받았다.
                    improvements: 문서와 구현 변경을 같은 배포 단위로 묶는다.
                  is_dirty: false
                  draft_content: null
                  created_at: '2026-03-14T11:00:00Z'
                  updated_at: '2026-03-14T11:20:00Z'
        '400':
          description: "쿼리 검증 실패 (예: date 형식 오류, daily_log_id 날짜 불일치)"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: daily_log_id가 없거나 사용자 소유가 아님
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error:
                  code: NOT_FOUND
                  message: 해당 일일 로그가 존재하지 않습니다.
        '401':
          $ref: '#/components/responses/Unauthorized'

    post:
      operationId: createRetroLog
      tags: [RetroLogs]
      summary: 회고 생성
      description: |
        회고 생성. `daily_log_id` 없이도 생성 가능. 성공 시 `daily_focus_stats.has_retro_log = true` UPSERT.
        `content`는 템플릿별 필수 키를 모두 포함하며, 값은 문자열이면 빈 문자열("")도 허용한다. (저장 시점은 클라이언트에서 결정)
      security:
        - BearerAuth: []
        - AccessTokenCookie: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateRetroLogRequest'
            examples:
              tech:
                summary: Tech 템플릿
                value:
                  retro_date: '2026-06-10'
                  template_type: Tech
                  content:
                    learned_today: Prisma $transaction으로 생성과 통계 갱신을 한 번에 처리하는 패턴을 배웠다.
                    applied_technology: optional JSON 필드 null 처리에 Prisma.DbNull을 적용했다.
                    technical_difficulty: PATCH 시 Json 타입과 DbNull 조합에서 타입 에러가 났다.
                    next_to_try: 회고 content 검색에 인덱스/쿼리 전략을 실험해본다.
              tech_blanks:
                summary: Tech (일부 빈 문자열)
                value:
                  retro_date: '2026-06-10'
                  template_type: Tech
                  content:
                    learned_today: 오늘 배운 내용
                    applied_technology: ''
                    technical_difficulty: ''
                    next_to_try: ''
              decision:
                summary: Decision 템플릿
                value:
                  retro_date: '2026-06-10'
                  template_type: Decision
                  content:
                    decision_made: 같은 날짜에 템플릿별로 회고를 나누고, 조회는 date+daily_log_id 또는 date+template_type으로 한다.
                    decision_reason: 일일 로그 없이도 회고를 남길 수 있어 템플릿으로 구분해야 한다.
                    outcome_impact: CONFLICT는 날짜+템플릿 단위로만 발생한다.
                    alternatives_considered: 날짜당 단일 회고만 허용하는 안은 폐기했다.
              communication:
                summary: Communication 템플릿
                value:
                  retro_date: '2026-06-10'
                  template_type: Communication
                  content:
                    communication_highlights: 짧은 미팅으로 API 계약을 빠르게 맞췄다.
                    communication_friction: 초기 문서에는 쿼리 파라미터가 하나만 필수라고 적혀 있었다.
                    feedback_received: 400 에러와 field를 명시해 달라는 요청을 받았다.
                    improvements: 명세 변경 시 Swagger와 Notion을 동시에 갱신하겠다.
              emotion:
                summary: Emotion 템플릿
                value:
                  retro_date: '2026-06-10'
                  template_type: Emotion
                  content:
                    mood_today: 병합 해소 후 안도감이 크다. 다소 피곤하다.
                    what_energized: 동료와 짝으로 디버깅한 시간.
                    what_drained: 인증·회고 작업을 번갈아 하며 맥락 전환이 잦았다.
                    grateful_for: 리뷰 코멘트가 구체적이어서 수정이 빨랐다.
      responses:
        '201':
          description: 회고 생성 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RetroLog'
        '400':
          description: template_type 오류
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: daily_log_id 없음
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '409':
          description: 해당 날짜·템플릿 조합의 회고가 이미 존재
          content:
            application/json:
