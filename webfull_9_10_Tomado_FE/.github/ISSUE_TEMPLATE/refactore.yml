name: Refactor
description: 코드 구조 개선
title: '[Refactor] '
labels: ['🔨 Refactor']

body:
    - type: textarea
      id: target
      attributes:
          label: 리팩토링 대상
          description: 어떤 부분을 개선하려고 하나요?
      validations:
          required: true

    - type: textarea
      id: reason
      attributes:
          label: 리팩토링 이유
          description: 왜 리팩토링이 필요한가요?

    - type: textarea
      id: plan
      attributes:
          label: 작업 계획
          description: 어떤 방식으로 개선할 예정인가요?
