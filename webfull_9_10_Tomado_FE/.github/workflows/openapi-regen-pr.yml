name: OpenAPI Regen PR

on:
  repository_dispatch:
    types:
      - openapi-updated

jobs:
  regen:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout develop
        uses: actions/checkout@v4
        with:
          ref: develop

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Clean generated files
        run: rm -rf src/api/generated
      
      - name: Regenerate API client
        run: npx orval

      - name: Build branch metadata
        id: meta
        env:
          BACKEND_SHA: ${{ github.event.client_payload.backend_sha }}
        run: |
          SHORT_SHA="${BACKEND_SHA::7}"
          BRANCH_NAME="refactor/openapi-regen-${SHORT_SHA}"
          PR_TITLE="chore: API client 재생성 (${SHORT_SHA})"

          echo "short_sha=${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          echo "branch=${BRANCH_NAME}" >> "$GITHUB_OUTPUT"
          echo "title=${PR_TITLE}" >> "$GITHUB_OUTPUT"

      - name: Detect changes
        id: changes
        run: |
          if git diff --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Create Pull Request
        if: steps.changes.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          branch: ${{ steps.meta.outputs.branch }}
          base: develop
          commit-message: "chore: regenerate API client (${{ steps.meta.outputs.short_sha }})"
          title: ${{ steps.meta.outputs.title }}
          body: |
            Auto-generated after backend OpenAPI update.

            - backend repo: ${{ github.event.client_payload.backend_repo }}
            - backend sha: ${{ github.event.client_payload.backend_sha }}

            If manual frontend changes are needed, continue pushing to this PR branch.
